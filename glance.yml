theme:
  presets:
    neon-focus:
      background-color: 255 14 6
      primary-color: 156 50 65
      negative-color: 342 65 65
      contrast-multiplier: 0.9
      text-saturation-multiplier: 0.8

    gruvbox-dark:
      background-color: 0 0 16
      contrast-multiplier: 1.2
      primary-color: 43 59 81
      positive-color: 61 66 44
      negative-color: 6 96 59

    catppuccin-macchiato:
      background-color: 232 23 18
      contrast-multiplier: 1.2
      primary-color: 220 83 75
      positive-color: 105 48 72
      negative-color: 351 74 73

pages:
  - name: Node
    head-widgets:
    - type: markets
      hide-header: true
      symbol-link-template: https://www.tradingview.com/symbols/{SYMBOL}/news
      markets:
        - symbol: VOO
          name: Vanguard S&P 500 ETF
        - symbol: QQQM
          name: Invesco QQQM ETF
        - symbol: VTI
          name: Vanguard Total Stock Market ETF
        - symbol: SGOV
          name: iShares 0-3 Month Treasury Bond ETF
        - symbol: SCHD
          name: Schwab U.S. Dividend Equity ETF

    columns:
      - size: small
        widgets:
          - type: custom-api
            title: Immich stats
            cache: 1d
            url: https://immich.pangolin-morpho.ts.net/api/server/statistics
            headers:
              x-api-key: xAxZaskfGgdIwaSu4EZmZnYJScDa16p6gJeU5YUiCmQ
              Accept: application/json
            template: |
              <div class="flex justify-between text-center">
                <div>
                    <div class="color-highlight size-h3">{{ .JSON.Int "photos" | formatNumber }}</div>
                    <div class="size-h6">PHOTOS</div>
                </div>
                <div>
                    <div class="color-highlight size-h3">{{ .JSON.Int "videos" | formatNumber }}</div>
                    <div class="size-h6">VIDEOS</div>
                </div>
                <div>
                    <div class="color-highlight size-h3">{{ div (.JSON.Int "usage" | toFloat) 1073741824 | toInt | formatNumber }}GB</div>
                    <div class="size-h6">USAGE</div>
                </div>
              </div>
          

          - type: repository
            repository: 0xSolanaceae/proXXy
            pull-requests-limit: 5
            issues-limit: 3
            commits-limit: 3

      - size: full
        widgets:
          - type: search
            autofocus: true
            search-engine: google
            new-tab: false
            bangs:
              - title: YouTube
                shortcut: "!yt"
                url: https://www.youtube.com/results?search_query={QUERY}
              - title: Github
                shortcut: "!gh"
                url: https://github.com/search?q={QUERY}&type=repositories
              - title: Reddit
                shortcut: "!r"
                url: https://www.reddit.com/search/?q={QUERY}

          - type: monitor
            cache: 1m
            title: Services # for icons: https://github.com/homarr-labs/dashboard-icons
            sites:
              - title: Unraid
                url: https://andromeda.pangolin-morpho.ts.net/
